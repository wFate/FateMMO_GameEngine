name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  windows-msvc:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: build
          key: windows-msvc-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: windows-msvc-

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build engine library
        run: cmake --build build --config Debug --target fate_engine -j4

      - name: Build demo
        run: cmake --build build --config Debug --target FateDemo -j4

  linux-gcc:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-14 libfreetype-dev libgl-dev \
            libx11-dev libxext-dev libxrandr-dev libxi-dev libxcursor-dev \
            libxinerama-dev libxss-dev libwayland-dev libxkbcommon-dev \
            libasound2-dev libpulse-dev libdbus-1-dev libudev-dev

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: linux-gcc14
          max-size: 500M

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug
             -DCMAKE_CXX_COMPILER=g++-14 -DCMAKE_C_COMPILER=gcc-14
             -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
             -DCMAKE_C_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Build unit tests
        run: cmake --build build --target fate_tests -j$(nproc)

      - name: Run unit tests
        working-directory: build
        run: ./fate_tests --no-colors --duration=true

  linux-clang:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 libfreetype-dev libgl-dev \
            libx11-dev libxext-dev libxrandr-dev libxi-dev libxcursor-dev \
            libxinerama-dev libxss-dev libwayland-dev libxkbcommon-dev \
            libasound2-dev libpulse-dev libdbus-1-dev libudev-dev

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: linux-clang18
          max-size: 500M

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug
             -DCMAKE_CXX_COMPILER=clang++-18 -DCMAKE_C_COMPILER=clang-18
             -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
             -DCMAKE_C_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build -j$(nproc)
