name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  windows-msvc:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: build
          key: windows-msvc-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: windows-msvc-

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build engine library
        run: cmake --build build --config Debug --target fate_engine -j4

      - name: Build demo
        run: cmake --build build --config Debug --target FateDemo -j4

  linux-gcc:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-13 libfreetype-dev xvfb mesa-utils libegl1-mesa-dev libgl-dev

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: build
          key: linux-gcc-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: linux-gcc-

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_COMPILER=g++-13 -DCMAKE_C_COMPILER=gcc-13

      - name: Build
        run: cmake --build build -j$(nproc)

  linux-clang:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-17 libfreetype-dev xvfb mesa-utils libegl1-mesa-dev libgl-dev

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: build
          key: linux-clang-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: linux-clang-

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_COMPILER=clang++-17 -DCMAKE_C_COMPILER=clang-17

      - name: Build
        run: cmake --build build -j$(nproc)
