name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  static-checks:
    name: "📊 Static checks / CI guardrails"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run CI guardrail checks
        shell: pwsh
        run: ./tools/test_ci_preflight.ps1

  windows-msvc:
    name: "🏁 Windows / Demo MSVC"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg artifacts
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg\downloads
            ~\AppData\Local\vcpkg\archives
          key: windows-msvc-vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: windows-msvc-vcpkg-${{ runner.os }}-

      - name: Run windows-msvc preflight
        shell: pwsh
        run: ./tools/pre_push_windows_msvc.ps1 -Ci

  windows-msvc-shipping:
    name: "🏁 Windows / Shipping Demo MSVC"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg artifacts
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg\downloads
            ~\AppData\Local\vcpkg\archives
          key: windows-msvc-vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: windows-msvc-vcpkg-${{ runner.os }}-

      - name: Run windows-msvc shipping preflight
        shell: pwsh
        run: ./tools/pre_push_windows_msvc.ps1 -Ci -Shipping

  linux-gcc:
    name: "🐧 Linux / Demo GCC 14"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-14 libfreetype-dev libgl-dev \
            libx11-dev libxext-dev libxrandr-dev libxi-dev libxcursor-dev \
            libxinerama-dev libxss-dev libwayland-dev libxkbcommon-dev \
            libasound2-dev libpulse-dev libdbus-1-dev libudev-dev

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: linux-gcc14
          max-size: 500M

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug
             -DCMAKE_CXX_COMPILER=g++-14 -DCMAKE_C_COMPILER=gcc-14
             -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
             -DCMAKE_C_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build -j$(nproc)

  linux-clang:
    name: "🐧 Linux / Demo Clang 18"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 libfreetype-dev libgl-dev \
            libx11-dev libxext-dev libxrandr-dev libxi-dev libxcursor-dev \
            libxinerama-dev libxss-dev libwayland-dev libxkbcommon-dev \
            libasound2-dev libpulse-dev libdbus-1-dev libudev-dev

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: linux-clang18
          max-size: 500M

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug
             -DCMAKE_CXX_COMPILER=clang++-18 -DCMAKE_C_COMPILER=clang-18
             -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
             -DCMAKE_C_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build -j$(nproc)
